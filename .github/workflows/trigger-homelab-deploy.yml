name: Trigger homelab deploy

# Tells the homelab repo that main moved. Homelab's update-flake-input
# workflow re-pins its `jamye-plz` flake input and rides the normal CI/CD
# pipeline, so the deployed service follows main within minutes of a push.

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to smg1024/homelab
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_PAT }}
        run: gh api repos/smg1024/homelab/dispatches -f event_type=jamye-plz-updated
